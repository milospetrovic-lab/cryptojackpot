<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CryptoJackpot — Particles Write Text</title>
<link href="https://fonts.googleapis.com/css?family=Cinzel:400,600,700|Montserrat:200,400,600" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: "Cinzel", "Montserrat", serif;
  }
</style>
</head>
<body>
<script>
/*
 * Adapted from Plasm.it "Particles Write Text" codepen.
 * Vanilla JS port, CryptoJackpot palette, transparent body.
 * - body/canvas bg transparent (no dark box behind)
 * - measureText-based sizing so the word always fits the viewport
 * - destination-out trail fade preserves transparency
 */
(() => {
  const TEXT = "CRYPTOJACKPOT";
  const particles = [];
  const isDesktop = window.innerWidth >= 1024;
  const frequency = isDesktop ? 8 : 16;

  const winW = () => window.innerWidth;
  const winH = () => window.innerHeight;

  function createCanvas(w, h) {
    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    return { canvas, context: canvas.getContext("2d") };
  }

  let c1 = createCanvas(winW(), winH());
  let c2 = createCanvas(winW(), winH());
  let c3 = createCanvas(winW(), winH());

  const tela = c1.canvas;
  const canvas = c1.context;

  Object.assign(c3.canvas.style, {
    position: "absolute",
    top: "0", left: "0", width: "100%", height: "100%",
  });
  document.body.appendChild(c3.canvas);

  // Fit text to available width — picks size so TEXT fills ~88% of iframe width.
  function writeText(cnvs, ctx, text) {
    ctx.clearRect(0, 0, cnvs.width, cnvs.height);
    const target = cnvs.width * 0.88;
    let size = 100;
    ctx.font = `700 ${size}px "Cinzel", "Montserrat", serif`;
    const baseW = ctx.measureText(text).width;
    size = Math.min(220, Math.max(44, Math.floor((target / baseW) * size)));
    ctx.font = `700 ${size}px "Cinzel", "Montserrat", serif`;
    // Faint gold ghost — becomes invisible as particles paint over it.
    ctx.fillStyle = "rgba(224, 255, 87, 0.18)";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const lineheight = Math.floor(size * 0.95);
    const lines = text.split("\n");
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(
        lines[i],
        cnvs.width / 2,
        cnvs.height / 2 + lineheight * i - (lineheight * (lines.length - 1)) / 2
      );
    }
  }
  writeText(c2.canvas, c2.context, TEXT);

  function blur(ctx, cnvs, amt) {
    ctx.filter = `blur(${amt}px)`;
    ctx.drawImage(cnvs, 0, 0);
    ctx.filter = "none";
  }

  class Particle {
    constructor(cnvs, options) {
      this.canvas = cnvs;
      this.x = options.x;
      this.y = options.y;
      this.s = 3 + Math.random();
      this.a = 0;
      this.w = winW();
      this.h = winH();
      this.radius = 0.5 + Math.random() * 20;
      this.color = this.radius > 5 ? "#E0FF57" : "#C41E3A";
    }
    render() {
      this.canvas.beginPath();
      this.canvas.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
      this.canvas.lineWidth = 2;
      this.canvas.fillStyle = this.color;
      this.canvas.fill();
      this.canvas.closePath();
    }
    move() {
      this.x += Math.cos(this.a) * this.s;
      this.y += Math.sin(this.a) * this.s;
      this.a += Math.random() * 0.8 - 0.4;
      if (this.x < 0 || this.x > this.w - this.radius) return false;
      if (this.y < 0 || this.y > this.h - this.radius) return false;
      this.render();
      return true;
    }
  }

  function popolate() {
    particles.push(new Particle(canvas, { x: winW() / 2, y: winH() / 2 }));
  }

  // Trail fade that preserves transparency — destination-out with low alpha.
  function clear() {
    canvas.globalCompositeOperation = "destination-out";
    canvas.globalAlpha = 0.06;
    canvas.fillStyle = "#000";
    canvas.fillRect(0, 0, tela.width, tela.height);
    canvas.globalAlpha = 1;
    canvas.globalCompositeOperation = "source-over";
  }

  function maskCanvas() {
    c3.context.clearRect(0, 0, c3.canvas.width, c3.canvas.height);
    c3.context.drawImage(c2.canvas, 0, 0, c2.canvas.width, c2.canvas.height);
    c3.context.globalCompositeOperation = "source-atop";
    c3.context.drawImage(c1.canvas, 0, 0);
    c3.context.globalCompositeOperation = "source-over";
    blur(c1.context, c1.canvas, 1.4);
  }

  function update() {
    clear();
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!particles[i].move()) particles.splice(i, 1);
    }
    maskCanvas();
    requestAnimationFrame(update);
  }

  setInterval(popolate, frequency);

  function onResize() {
    const w = winW(), h = winH();
    [c1, c2, c3].forEach(({ canvas }) => {
      canvas.width = w; canvas.height = h;
    });
    writeText(c2.canvas, c2.context, TEXT);
  }
  window.addEventListener("resize", onResize);

  // Web fonts load async — redraw once Cinzel is ready so the size is accurate.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => writeText(c2.canvas, c2.context, TEXT));
  }

  update();
})();
</script>
</body>
</html>
