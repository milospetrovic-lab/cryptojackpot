<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CryptoJackpot — Particle Text</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden; font-family: serif; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: true });
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let w = 0, h = 0;

  const TEXT = "CRYPTOJACKPOT";

  const off = document.createElement("canvas");
  const octx = off.getContext("2d");

  let targets = [];

  const buildTargets = () => {
    off.width = w;
    off.height = h;
    octx.clearRect(0, 0, w, h);
    octx.fillStyle = "#FFD700";
    const fontSize = Math.min(w / 9, 120);
    octx.font = `700 ${fontSize}px "Cinzel", serif`;
    octx.textAlign = "center";
    octx.textBaseline = "middle";
    octx.letterSpacing = "8px";
    octx.fillText(TEXT, w / 2, h / 2);

    const img = octx.getImageData(0, 0, w, h).data;
    const step = Math.max(3, Math.floor(fontSize / 22));
    const pts = [];
    for (let y = 0; y < h; y += step) {
      for (let x = 0; x < w; x += step) {
        const i = (y * w + x) * 4;
        if (img[i + 3] > 128) pts.push({ x, y });
      }
    }
    targets = pts;
  };

  const resize = () => {
    w = canvas.clientWidth;
    h = canvas.clientHeight;
    canvas.width = w * DPR;
    canvas.height = h * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    buildTargets();
    seed();
  };

  let particles = [];
  const seed = () => {
    particles = targets.map((t) => ({
      tx: t.x,
      ty: t.y,
      x: w / 2 + (Math.random() - 0.5) * w * 1.6,
      y: h / 2 + (Math.random() - 0.5) * h * 1.6,
      vx: 0,
      vy: 0,
      size: 0.7 + Math.random() * 1.2,
      ruby: Math.random() < 0.04,
    }));
  };

  resize();
  window.addEventListener("resize", resize);

  function step() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      const dx = p.tx - p.x;
      const dy = p.ty - p.y;
      p.vx = (p.vx + dx * 0.012) * 0.86;
      p.vy = (p.vy + dy * 0.012) * 0.86;
      p.x += p.vx;
      p.y += p.vy;
      const col = p.ruby
        ? "rgba(230,57,70,0.9)"
        : "rgba(255,215,0,0.85)";
      ctx.fillStyle = col;
      ctx.shadowColor = col;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    requestAnimationFrame(step);
  }
  step();
})();
</script>
</body>
</html>
