<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Magneto Field</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: transparent; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: true });
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  let w = 0, h = 0, cx = 0, cy = 0;

  const resize = () => {
    w = canvas.clientWidth;
    h = canvas.clientHeight;
    canvas.width = w * DPR;
    canvas.height = h * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = w / 2;
    cy = h / 2;
  };
  resize();
  window.addEventListener("resize", resize);

  const N = 180;
  const particles = Array.from({ length: N }, () => spawn());

  function spawn() {
    const a = Math.random() * Math.PI * 2;
    const r = 180 + Math.random() * 420;
    return {
      x: cx + Math.cos(a) * r,
      y: cy + Math.sin(a) * r,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: 0.6 + Math.random() * 1.6,
      hue: Math.random() < 0.92 ? "gold" : "ruby",
      life: 0,
      max: 260 + Math.random() * 260,
    };
  }

  const mouse = { x: cx, y: cy, active: false };
  window.addEventListener("pointermove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    mouse.active = true;
  });

  function step() {
    ctx.clearRect(0, 0, w, h);

    // attractor — center-biased, subtle mouse influence
    const ax = mouse.active ? mouse.x * 0.35 + cx * 0.65 : cx;
    const ay = mouse.active ? mouse.y * 0.35 + cy * 0.65 : cy;

    for (let i = 0; i < N; i++) {
      const p = particles[i];
      const dx = ax - p.x;
      const dy = ay - p.y;
      const d2 = dx * dx + dy * dy + 40;
      const d = Math.sqrt(d2);
      const pull = 0.045 + 18 / d2;

      p.vx += (dx / d) * pull;
      p.vy += (dy / d) * pull;
      p.vx *= 0.96;
      p.vy *= 0.96;
      p.x += p.vx;
      p.y += p.vy;
      p.life++;

      // orbit tangent so they don't all sink into the middle
      const tx = -dy / d;
      const ty = dx / d;
      p.vx += tx * 0.15;
      p.vy += ty * 0.15;

      if (p.life > p.max || d < 22) {
        Object.assign(p, spawn());
        continue;
      }

      const alpha = Math.min(1, p.life / 40) * (1 - p.life / p.max) * 0.9;
      ctx.beginPath();
      const color =
        p.hue === "ruby"
          ? `rgba(230,57,70,${alpha})`
          : `rgba(255,215,0,${alpha})`;
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    requestAnimationFrame(step);
  }
  step();
})();
</script>
</body>
</html>
