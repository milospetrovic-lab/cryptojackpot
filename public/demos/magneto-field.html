<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CryptoJackpot — Magneto Field</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
</style>
</head>
<body>
<script>
/*
 * Adapted from Plasm.it "MAGNETO" codepen.
 * Vanilla JS port, CryptoJackpot palette (gold + ruby on charcoal).
 * Particles spawn outside the viewport and are pulled toward the center.
 */
(() => {
  const BG = "#0A0A0C";
  const max_particles = 2200;
  const frequency = 10;
  const max_time = frequency * max_particles;
  const particles = [];
  let time_to_recreate = false;

  const winW = () => window.innerWidth;
  const winH = () => window.innerHeight;

  const tela = document.createElement("canvas");
  tela.width = winW();
  tela.height = winH();
  Object.assign(tela.style, {
    position: "absolute", top: "0", left: "0", width: "100%", height: "100%",
  });
  document.body.appendChild(tela);
  const canvas = tela.getContext("2d");

  setTimeout(() => { time_to_recreate = true; }, max_time);

  class Particle {
    constructor(cnvs) {
      const random = Math.random();
      this.progress = 0;
      this.canvas = cnvs;
      this.center = { x: winW() / 2, y: winH() / 2 };
      this.point_of_attraction = { x: winW() / 2, y: winH() / 2 };

      if (Math.random() > 0.5) {
        this.x = winW() * Math.random();
        this.y =
          Math.random() > 0.5
            ? -Math.random() - 100
            : winH() + Math.random() + 100;
      } else {
        this.x =
          Math.random() > 0.5
            ? -Math.random() - 100
            : winW() + Math.random() + 100;
        this.y = winH() * Math.random();
      }

      this.s = Math.random() * 2;
      this.a = 0;
      this.w = winW();
      this.h = winH();

      // CryptoJackpot palette:
      //   common small  → deep gold #D4AF37
      //   crimson spice → ruby #C41E3A
      //   rare bright   → gold highlight #FFE88A
      this.radius = random > 0.2 ? Math.random() * 1 : Math.random() * 3;
      this.color = random > 0.2 ? "#D4AF37" : "#C41E3A";
      this.radius = random > 0.8 ? Math.random() * 2.2 : this.radius;
      this.color = random > 0.8 ? "#FFE88A" : this.color;
    }
    calculateDistance(v1, v2) {
      const x = Math.abs(v1.x - v2.x);
      const y = Math.abs(v1.y - v2.y);
      return Math.sqrt(x * x + y * y);
    }
    render() {
      this.canvas.beginPath();
      this.canvas.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
      this.canvas.lineWidth = 2;
      this.canvas.fillStyle = this.color;
      this.canvas.fill();
      this.canvas.closePath();
    }
    move() {
      const p1 = { x: this.x, y: this.y };
      const distance = this.calculateDistance(p1, this.point_of_attraction);
      const force = Math.max(100, 1 + distance);
      const attr_x = (this.point_of_attraction.x - this.x) / force;
      const attr_y = (this.point_of_attraction.y - this.y) / force;

      this.x += Math.cos(this.a) * this.s + attr_x;
      this.y += Math.sin(this.a) * this.s + attr_y;
      this.a +=
        Math.random() > 0.5
          ? Math.random() * 0.9 - 0.45
          : Math.random() * 0.4 - 0.2;

      if (distance < 30 + Math.random() * 100) return false;
      this.render();
      this.progress++;
      return true;
    }
  }

  function popolate(num) {
    for (let i = 0; i < num; i++) {
      setTimeout(() => {
        particles.push(new Particle(canvas));
      }, frequency * i);
    }
    return particles.length;
  }

  // Trail fade that preserves transparency so the hero backdrop shows through.
  function clear() {
    canvas.globalCompositeOperation = "destination-out";
    canvas.globalAlpha = 0.09;
    canvas.fillStyle = "#000";
    canvas.fillRect(0, 0, tela.width, tela.height);
    canvas.globalAlpha = 1;
    canvas.globalCompositeOperation = "source-over";
  }

  function update() {
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!particles[i].move()) particles.splice(i, 1);
    }
    if (time_to_recreate && particles.length < max_particles) {
      popolate(1);
    }
    clear();
    requestAnimationFrame(update);
  }

  window.addEventListener("resize", () => {
    tela.width = winW();
    tela.height = winH();
  });

  popolate(max_particles);
  update();
})();
</script>
</body>
</html>
