<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CryptoJackpot — Electric Field</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
</style>
</head>
<body>
<script>
/*
 * Electric field — a handful of roaming nodes fire lightning between them.
 * Replaces the softer magneto pen on the hero. Ruby + neon-yellow arcs
 * with a subtle glow on the canvas. Vanilla JS, transparent body.
 */
(() => {
  const winW = () => window.innerWidth;
  const winH = () => window.innerHeight;

  const isDesktop = winW() >= 1024;
  const NODES = isDesktop ? 38 : 18;
  const MAX_LINK_DISTANCE = isDesktop ? 340 : 240;
  const BRANCH_DEPTH = 4;
  const BOLT_BASE_PROB = 0.028; // base chance per eligible pair per frame
  const BOLT_PROX_BONUS = 0.12; // bonus scaled by proximity

  const canvas = document.createElement("canvas");
  Object.assign(canvas.style, {
    position: "absolute", top: "0", left: "0",
    width: "100%", height: "100%",
    mixBlendMode: "screen",
  });
  canvas.width = winW();
  canvas.height = winH();
  document.body.appendChild(canvas);
  const ctx = canvas.getContext("2d");

  function onResize() {
    canvas.width = winW();
    canvas.height = winH();
  }
  window.addEventListener("resize", onResize);

  // Roaming nodes — slow orbit around the viewport center
  const nodes = Array.from({ length: NODES }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.35,
    vy: (Math.random() - 0.5) * 0.35,
    seed: Math.random() * Math.PI * 2,
  }));

  // Draw a jagged lightning segment between (a) and (b), branching.
  function bolt(ax, ay, bx, by, depth, color) {
    if (depth <= 0) {
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.stroke();
      return;
    }
    const mx = (ax + bx) / 2 + (Math.random() - 0.5) * (32 / depth);
    const my = (ay + by) / 2 + (Math.random() - 0.5) * (32 / depth);
    bolt(ax, ay, mx, my, depth - 1, color);
    bolt(mx, my, bx, by, depth - 1, color);

    // occasional side-branch
    if (depth > 1 && Math.random() < 0.22) {
      const sx = mx + (Math.random() - 0.5) * 40;
      const sy = my + (Math.random() - 0.5) * 40;
      bolt(mx, my, sx, sy, depth - 2, color);
    }
  }

  function frame() {
    // Soft fade preserves transparency (destination-out) — trails dissipate.
    ctx.globalCompositeOperation = "destination-out";
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";

    // Update node positions
    for (const n of nodes) {
      n.x += n.vx + Math.cos(n.seed += 0.01) * 0.15;
      n.y += n.vy + Math.sin(n.seed * 1.3) * 0.15;
      if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    }

    // Draw nodes
    ctx.shadowBlur = 12;
    for (const n of nodes) {
      ctx.shadowColor = "#E0FF57";
      ctx.fillStyle = "#E0FF57";
      ctx.beginPath();
      ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // Occasionally fire a bolt between two close-enough nodes
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const d = Math.hypot(dx, dy);
        if (d > MAX_LINK_DISTANCE) continue;
        if (Math.random() > BOLT_BASE_PROB + (1 - d / MAX_LINK_DISTANCE) * BOLT_PROX_BONUS) continue;
        const color = Math.random() > 0.75
          ? "rgba(196, 30, 58, 0.9)"
          : "rgba(224, 255, 87, 0.9)";
        ctx.shadowColor = color;
        ctx.shadowBlur = 14;
        bolt(
          nodes[i].x, nodes[i].y,
          nodes[j].x, nodes[j].y,
          BRANCH_DEPTH,
          color
        );
        ctx.shadowBlur = 0;
      }
    }

    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
