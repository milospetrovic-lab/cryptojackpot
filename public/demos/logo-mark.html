<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cryptojackpot logo</title>
<link href="https://fonts.googleapis.com/css?family=Cinzel:700" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    overflow: hidden;
    background: transparent;
  }
</style>
</head>
<body>
<script>
/*
 * Miniaturised "Particles Write Text" for the nav logo.
 * Small band, continuous emission from center, writes "cryptojackpot".
 */
(() => {
  const TEXT = "cryptojackpot";
  const particles = [];
  const frequency = 10;

  const winW = () => window.innerWidth;
  const winH = () => window.innerHeight;

  const make = (w, h) => {
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    return { canvas: c, context: c.getContext("2d") };
  };

  let c1 = make(winW(), winH());
  let c2 = make(winW(), winH());
  let c3 = make(winW(), winH());

  Object.assign(c3.canvas.style, {
    position: "absolute", top: 0, left: 0, width: "100%", height: "100%",
  });
  document.body.appendChild(c3.canvas);

  function writeText() {
    const ctx = c2.context, cnvs = c2.canvas;
    ctx.clearRect(0, 0, cnvs.width, cnvs.height);
    const target = cnvs.width * 0.92;
    let size = 40;
    ctx.font = `700 ${size}px "Cinzel", serif`;
    const base = ctx.measureText(TEXT).width || 1;
    size = Math.min(cnvs.height * 0.72, Math.floor((target / base) * size));
    ctx.font = `700 ${size}px "Cinzel", serif`;
    ctx.fillStyle = "rgba(224, 255, 87, 0.22)";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(TEXT, cnvs.width / 2, cnvs.height / 2);
  }
  writeText();

  class P {
    constructor(x, y) {
      this.x = x; this.y = y;
      this.s = 1.4 + Math.random() * 1.6;
      this.a = Math.random() * Math.PI * 2;
      this.radius = 0.4 + Math.random() * 3.6;
      this.color = this.radius > 2 ? "#E0FF57" : "#C41E3A";
    }
    render(ctx) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
    move(ctx, w, h) {
      this.x += Math.cos(this.a) * this.s;
      this.y += Math.sin(this.a) * this.s;
      this.a += Math.random() * 0.8 - 0.4;
      if (this.x < 0 || this.x > w - this.radius) return false;
      if (this.y < 0 || this.y > h - this.radius) return false;
      this.render(ctx);
      return true;
    }
  }

  setInterval(() => {
    particles.push(new P(c1.canvas.width / 2, c1.canvas.height / 2));
  }, frequency);

  function clear() {
    const ctx = c1.context;
    ctx.globalCompositeOperation = "destination-out";
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, c1.canvas.width, c1.canvas.height);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
  }

  function mask() {
    const ctx = c3.context;
    ctx.clearRect(0, 0, c3.canvas.width, c3.canvas.height);
    ctx.drawImage(c2.canvas, 0, 0);
    ctx.globalCompositeOperation = "source-atop";
    ctx.drawImage(c1.canvas, 0, 0);
    ctx.globalCompositeOperation = "source-over";
  }

  function update() {
    clear();
    for (let i = particles.length - 1; i >= 0; i--) {
      if (!particles[i].move(c1.context, c1.canvas.width, c1.canvas.height))
        particles.splice(i, 1);
    }
    mask();
    requestAnimationFrame(update);
  }

  window.addEventListener("resize", () => {
    const w = winW(), h = winH();
    [c1, c2, c3].forEach(({ canvas }) => { canvas.width = w; canvas.height = h; });
    writeText();
  });

  if (document.fonts && document.fonts.ready) document.fonts.ready.then(writeText);

  update();
})();
</script>
</body>
</html>
